<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of a Frontend Developer - Basic HTML Project"
    />
    <title>Contact</title>
  </head>
  <body>
    <header>
      <nav>
        <h2 class="my-name">Wency Banez</h2>
        <div class="nav-container">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Projects.html">Projects</a></li>
            <li><a href="Articles.html">Articles</a></li>
            <li><a href="Contact.html">Contact</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <section id="contact-form">
        <h2>Contact Me</h2>
        <form action="#" method="post">
          <div>
            <label for="user-name">Full Name:</label><br />
            <input
              type="text"
              id="user-name"
              name="user_name"
              placeholder="Wenc"
              required
            />
          </div>
          <br />

          <div>
            <label for="user-email">Email Address:</label><br />
            <input
              type="email"
              id="user-email"
              name="user_email"
              placeholder="example@email.com"
              required
            />
          </div>
          <br />

          <div>
            <label for="message">Your Message:</label><br />
            <textarea
              id="message"
              name="user_message"
              rows="5"
              cols="30"
              placeholder="Type your message here..."
            ></textarea>
          </div>
          <br />

          <div>
            <button type="submit">Send Message</button>
            <button type="reset">Clear Form</button>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; All rights reserved 2026</p>
    </footer>
  </body>
</html>
